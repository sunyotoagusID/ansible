---
- name: Proxmox 8 - Full System Dist-Upgrade
  hosts: proxmox_nodes # Pastikan sesuai dengan nama inventory di Semaphore
  become: yes
  gather_facts: no

  tasks:
    - name: Lakukan full dist-upgrade (Proxmox Standard)
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: dist_upgrade_status

    - name: Cek flag system reboot
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Peringatan Kritis - Reboot Dibutuhkan
      ansible.builtin.debug:
        msg: "⚠️ PENTING: Node ini telah di-upgrade dan membutuhkan REBOOT manual untuk menerapkan kernel baru."
      when: reboot_required.stat.exists
