---
- name: Proxmox 8 - Full Sequential Dist-Upgrade
  hosts: proxmox_nodes
  become: yes
  gather_facts: yes
  
  # PENTING: Mengeksekusi node satu per satu untuk menjaga Quorum Cluster
  serial: 1

  tasks:
    - name: 1. Validasi Koneksi dan Status Sudo
      ansible.builtin.command: whoami
      register: sudo_check
      changed_when: false

    - name: 2. Segarkan Cache Repositori (APT Update)
      ansible.builtin.apt:
        update_cache: yes
      register: apt_update_result

    - name: 3. Eksekusi Full Dist-Upgrade (Non-Interactive)
      ansible.builtin.apt:
        upgrade: dist
        force_apt_get: yes
        dpkg_options: 'force-confold,force-confdef'
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: dist_upgrade_result

    - name: 4. Catat Hasil Log Upgrade ke Semaphore
      ansible.builtin.debug:
        msg: "Status Upgrade pada {{ inventory_hostname }}: {{ dist_upgrade_result.stdout | default('Tidak ada paket yang diperbarui') }}"
      when: dist_upgrade_result.changed

    - name: 5. Periksa Apakah Sistem Membutuhkan Reboot
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: 6. Evaluasi Status Kebutuhan Reboot
      ansible.builtin.debug:
        msg: "⚠️ PERINGATAN: Node {{ inventory_hostname }} sukses diperbarui, tetapi MEMBUTUHKAN REBOOT MANUAl (Kernel/Core Library diperbarui)."
      when: reboot_flag.stat.exists

    - name: 7. Jeda Pengkondisian Kluster (Cooldown)
      ansible.builtin.pause:
        seconds: 15
      comment: "Memberikan waktu bagi pve-cluster untuk sinkronisasi sebelum berpindah ke node berikutnya."
