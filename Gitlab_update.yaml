---
# ============================================================
# MASTER PLAYBOOK: GitLab Security Hardening + Patch (Patch-Only)
# Compatible: Ansible Semaphore
# Urutan: Pre-flight → Security → OS Patch → GitLab Patch → Post-flight
# ============================================================

- name: "PHASE 0 | Pre-flight Checks"
  hosts: gitlab_servers
  gather_facts: true
  any_errors_fatal: true
  tags: [preflight, always]
  tasks:

    - name: "[PRE-0.1] Verifikasi koneksi SSH ke host"
      ping:
      register: ping_result
      failed_when: ping_result is failed

    - name: "[PRE-0.2] Cek Python interpreter tersedia"
      raw: python3 --version || python --version
      register: python_check
      changed_when: false
      failed_when: python_check.rc != 0

    - name: "[PRE-0.3] Gather full facts"
      setup:
        gather_subset:
          - hardware
          - network
          - virtual

    - name: "[PRE-0.4] Validasi OS yang didukung"
      assert:
        that:
          - ansible_os_family == "Debian"
          - ansible_distribution in ["Ubuntu", "Debian"]
          - ansible_distribution_major_version | int >= 20
        fail_msg: >
          OS tidak didukung: {{ ansible_distribution }} {{ ansible_distribution_version }}.
          Hanya Ubuntu 20.04+ / Debian 11+ yang didukung.
        success_msg: "OS valid: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: "[PRE-0.5] Cek apakah GitLab terinstall"
      stat:
        path: /usr/bin/gitlab-ctl
      register: gitlab_ctl_stat
      failed_when: false

    - name: "[PRE-0.6] Fail jika GitLab tidak ditemukan"
      fail:
        msg: >
          gitlab-ctl tidak ditemukan di /usr/bin/gitlab-ctl.
          Pastikan GitLab sudah terinstall sebelum menjalankan playbook ini.
      when: not gitlab_ctl_stat.stat.exists

    - name: "[PRE-0.7] Ambil versi GitLab saat ini"
      shell: |
        gitlab-rake gitlab:env:info 2>/dev/null | grep "GitLab version" | awk '{print $NF}' || \
        dpkg -l {{ gitlab_package_name }} 2>/dev/null | grep "^ii" | awk '{print $3}' || \
        echo "UNKNOWN"
      register: gitlab_current_version
      changed_when: false
      failed_when: false

    - name: "[PRE-0.8] Tampilkan versi GitLab"
      debug:
        msg: "GitLab versi saat ini: {{ gitlab_current_version.stdout | trim }}"

    - name: "[PRE-0.9] Cek disk space (minimum 5GB free)"
      shell: df -BG {{ gitlab_backup_path | default('/var/opt/gitlab') }} | tail -1 | awk '{print $4}' | tr -d 'G'
      register: disk_free_gb
      changed_when: false
      failed_when: false

    - name: "[PRE-0.10] Fail jika disk tidak cukup"
      fail:
        msg: >
          Disk space tidak cukup: {{ disk_free_gb.stdout | trim }}GB tersisa.
          Minimum 5GB diperlukan untuk backup dan patching.
      when:
        - disk_free_gb.stdout | trim | int < 5

    - name: "[PRE-0.11] Cek status services GitLab"
      shell: gitlab-ctl status 2>&1
      register: gitlab_status_pre
      changed_when: false
      failed_when: false

    - name: "[PRE-0.12] Tampilkan status GitLab pre-patch"
      debug:
        msg: "{{ gitlab_status_pre.stdout_lines }}"

    - name: "[PRE-0.13] Cek apakah ada apt lock"
      shell: |
        lsof /var/lib/dpkg/lock-frontend 2>/dev/null | wc -l
      register: apt_lock_check
      changed_when: false
      failed_when: false

    - name: "[PRE-0.14] Tunggu apt lock hilang"
      shell: |
        timeout={{ apt_lock_timeout }} elapsed=0
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock >/dev/null 2>&1; do
          if [ "$elapsed" -ge "$timeout" ]; then
            echo "TIMEOUT: apt lock tidak hilang setelah ${timeout}s"
            exit 1
          fi
          echo "Menunggu apt lock... ${elapsed}s"
          sleep 5
          elapsed=$((elapsed + 5))
        done
        echo "apt lock bebas"
      register: apt_lock_wait
      changed_when: false
      when: apt_lock_check.stdout | int > 0

    - name: "[PRE-0.15] Simpan facts GitLab pre-patch ke file lokal"
      copy:
        content: |
          hostname: {{ inventory_hostname }}
          timestamp: {{ ansible_date_time.iso8601 }}
          gitlab_version_pre: {{ gitlab_current_version.stdout | trim }}
          os: {{ ansible_distribution }} {{ ansible_distribution_version }}
          disk_free_gb: {{ disk_free_gb.stdout | trim }}
        dest: "/tmp/gitlab_preflight_{{ inventory_hostname }}.txt"
      delegate_to: localhost
      become: false


- name: "PHASE 1 | OS Security Updates (non-kernel)"
  hosts: gitlab_servers
  gather_facts: false
  any_errors_fatal: false
  tags: [os_security, patch]
  tasks:

    - name: "[OS-1.1] Update apt cache"
      apt:
        update_cache: true
        cache_valid_time: 0
      register: apt_update
      retries: "{{ apt_retries }}"
      delay: "{{ apt_retry_delay }}"
      until: apt_update is succeeded
      failed_when: apt_update is failed

    - name: "[OS-1.2] Identifikasi security updates tersedia"
      shell: |
        apt-get -s upgrade 2>/dev/null | grep -i "^Inst" | grep -i "security" | \
        grep -v -E "({{ os_exclude_packages | join('|') }})" || echo "NONE"
      register: security_updates_available
      changed_when: false

    - name: "[OS-1.3] Tampilkan security updates tersedia"
      debug:
        msg: "Security updates: {{ security_updates_available.stdout_lines }}"

    - name: "[OS-1.4] Install unattended-upgrades jika belum ada"
      apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present

    - name: "[OS-1.5] Apply HANYA security patches OS (exclude kernel)"
      shell: |
        DEBIAN_FRONTEND=noninteractive apt-get install \
          --only-upgrade \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold" \
          -y \
          $(apt-get -s upgrade 2>/dev/null | grep -i "^Inst" | grep -i "security" | \
            grep -v -E "({{ os_exclude_packages | join('|') }})" | \
            awk '{print $2}') 2>&1 || true
      register: os_security_patch
      when: os_security_only | bool
      changed_when: "'0 upgraded' not in os_security_patch.stdout"

    - name: "[OS-1.6] Tampilkan hasil OS patching"
      debug:
        msg: "{{ os_security_patch.stdout_lines | default(['Tidak ada security patch diterapkan']) }}"

    - name: "[OS-1.7] Cek apakah reboot diperlukan (OS)"
      stat:
        path: /var/run/reboot-required
      register: reboot_required_os

    - name: "[OS-1.8] Catat status reboot"
      debug:
        msg: >
          {% if reboot_required_os.stat.exists %}
          ⚠️  REBOOT DIPERLUKAN setelah OS security patch (kernel tidak di-update, reboot aman ditunda)
          {% else %}
          ✅ Tidak ada reboot required untuk OS patch
          {% endif %}


- name: "PHASE 2 | Security Hardening"
  hosts: gitlab_servers
  gather_facts: false
  any_errors_fatal: false
  tags: [security, hardening]
  tasks:

    # --- SSH Hardening ---
    - name: "[SEC-2.1] Backup konfigurasi SSH original"
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.bak.{{ ansible_date_time.date }}
        remote_src: true
        force: false
      when: ssh_harden_enabled | bool

    - name: "[SEC-2.2] Terapkan SSH hardening"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        backup: false
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries {{ ssh_max_auth_tries }}' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval {{ ssh_client_alive_interval }}' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax {{ ssh_client_alive_count_max }}' }
        - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
        - { regexp: '^#?AllowAgentForwarding', line: 'AllowAgentForwarding no' }
        - { regexp: '^#?AllowTcpForwarding', line: 'AllowTcpForwarding no' }
        - { regexp: '^#?PrintLastLog', line: 'PrintLastLog yes' }
        - { regexp: '^#?LoginGraceTime', line: 'LoginGraceTime 30' }
        - { regexp: '^#?MaxStartups', line: 'MaxStartups 10:30:60' }
        - { regexp: '^#?Ciphers', line: 'Ciphers {{ ssh_allowed_ciphers }}' }
        - { regexp: '^#?MACs', line: 'MACs {{ ssh_allowed_macs }}' }
        - { regexp: '^#?KexAlgorithms', line: 'KexAlgorithms {{ ssh_kex_algorithms }}' }
        - { regexp: '^#?Protocol', line: 'Protocol 2' }
        - { regexp: '^#?UsePAM', line: 'UsePAM yes' }
        - { regexp: '^#?IgnoreRhosts', line: 'IgnoreRhosts yes' }
        - { regexp: '^#?HostbasedAuthentication', line: 'HostbasedAuthentication no' }
        - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
      notify: restart_sshd
      when: ssh_harden_enabled | bool

    - name: "[SEC-2.3] Validasi syntax sshd_config sebelum restart"
      shell: sshd -t
      register: sshd_config_test
      changed_when: false
      failed_when: sshd_config_test.rc != 0
      when: ssh_harden_enabled | bool

    # --- Sysctl / Kernel Hardening ---
    - name: "[SEC-2.4] Terapkan kernel sysctl hardening"
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-gitlab-hardening.conf
      loop:
        # Network security
        - { key: 'net.ipv4.tcp_syncookies', value: '1' }
        - { key: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { key: 'net.ipv4.conf.default.rp_filter', value: '1' }
        - { key: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        - { key: 'net.ipv4.conf.default.accept_source_route', value: '0' }
        - { key: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.default.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.secure_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.log_martians', value: '1' }
        - { key: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
        - { key: 'net.ipv4.icmp_ignore_bogus_error_responses', value: '1' }
        - { key: 'net.ipv6.conf.all.disable_ipv6', value: '1' }
        # Memory protection
        - { key: 'kernel.randomize_va_space', value: '2' }
        - { key: 'fs.suid_dumpable', value: '0' }
        - { key: 'kernel.core_uses_pid', value: '1' }
        - { key: 'kernel.dmesg_restrict', value: '1' }
        - { key: 'kernel.kptr_restrict', value: '2' }
        # File system
        - { key: 'fs.protected_hardlinks', value: '1' }
        - { key: 'fs.protected_symlinks', value: '1' }
      when: sysctl_harden_enabled | bool
      failed_when: false

    # --- Firewall (UFW) ---
    - name: "[SEC-2.5] Install UFW"
      apt:
        name: ufw
        state: present
      when: firewall_enabled | bool

    - name: "[SEC-2.6] Set UFW default policies"
      ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: deny }
        - { direction: outgoing, policy: allow }
      when: firewall_enabled | bool

    - name: "[SEC-2.7] Allow HTTP"
      ufw:
        rule: allow
        port: "{{ gitlab_http_port }}"
        proto: tcp
      when: firewall_enabled | bool

    - name: "[SEC-2.8] Allow HTTPS"
      ufw:
        rule: allow
        port: "{{ gitlab_https_port }}"
        proto: tcp
      when: firewall_enabled | bool

    - name: "[SEC-2.9] Allow SSH hanya dari network tertentu"
      ufw:
        rule: allow
        port: "{{ gitlab_ssh_port }}"
        proto: tcp
        src: "{{ item }}"
      loop: "{{ gitlab_allowed_ssh_networks }}"
      when: firewall_enabled | bool

    - name: "[SEC-2.10] Enable UFW"
      ufw:
        state: enabled
      when: firewall_enabled | bool

    # --- Fail2ban ---
    - name: "[SEC-2.11] Install fail2ban"
      apt:
        name: fail2ban
        state: present
      when: fail2ban_enabled | bool

    - name: "[SEC-2.12] Konfigurasi fail2ban untuk GitLab"
      copy:
        dest: /etc/fail2ban/jail.d/gitlab.conf
        content: |
          [DEFAULT]
          bantime  = {{ fail2ban_bantime }}
          findtime = {{ fail2ban_findtime }}
          maxretry = {{ fail2ban_maxretry }}
          backend  = auto
          usedns   = warn

          [sshd]
          enabled  = true
          port     = {{ gitlab_ssh_port }}
          filter   = sshd
          logpath  = /var/log/auth.log
          maxretry = {{ fail2ban_maxretry }}

          [gitlab]
          enabled  = true
          port     = http,https
          filter   = gitlab
          logpath  = /var/log/gitlab/gitlab-rails/production.log
          maxretry = {{ fail2ban_maxretry }}
        mode: '0644'
      when: fail2ban_enabled | bool
      notify: restart_fail2ban

    - name: "[SEC-2.13] Buat filter fail2ban untuk GitLab"
      copy:
        dest: /etc/fail2ban/filter.d/gitlab.conf
        content: |
          [Definition]
          failregex = Failed Login: username=.+ ip=<HOST>
                      Rack attack blocked: method=.+ path=.+ rule=.+ ip=<HOST>
          ignoreregex =
        mode: '0644'
      when: fail2ban_enabled | bool
      notify: restart_fail2ban

    - name: "[SEC-2.14] Enable dan start fail2ban"
      systemd:
        name: fail2ban
        enabled: true
        state: started
      when: fail2ban_enabled | bool

    # --- File Permission Hardening ---
    - name: "[SEC-2.15] Secure sensitive file permissions"
      file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
        owner: "{{ item.owner | default(omit) }}"
      loop:
        - { path: '/etc/passwd', mode: '0644' }
        - { path: '/etc/shadow', mode: '0640', owner: 'root' }
        - { path: '/etc/group', mode: '0644' }
        - { path: '/etc/gshadow', mode: '0640', owner: 'root' }
        - { path: '/etc/ssh/sshd_config', mode: '0600' }
        - { path: '/var/opt/gitlab/gitlab-rails/etc', mode: '0750' }
      failed_when: false

    - name: "[SEC-2.16] Disable USB storage (opsional - uncomment jika diperlukan)"
      copy:
        dest: /etc/modprobe.d/disable-usb-storage.conf
        content: "install usb-storage /bin/true\n"
        mode: '0644'
      failed_when: false

  handlers:
    - name: restart_sshd
      systemd:
        name: sshd
        state: restarted
      failed_when: false

    - name: restart_fail2ban
      systemd:
        name: fail2ban
        state: restarted
      failed_when: false


- name: "PHASE 3 | GitLab Pre-Patch Preparation"
  hosts: gitlab_servers
  gather_facts: false
  any_errors_fatal: true
  tags: [gitlab_patch, prepatch]
  tasks:

    - name: "[PREP-3.1] Enable GitLab maintenance mode"
      shell: |
        gitlab-rails runner "
          Gitlab::CurrentSettings.update!(
            maintenance_mode: true,
            maintenance_mode_message: '{{ gitlab_maintenance_message }}'
          )
        " 2>&1
      register: maintenance_mode_result
      failed_when: false
      when: gitlab_maintenance_enabled | bool

    - name: "[PREP-3.2] Tampilkan hasil maintenance mode"
      debug:
        msg: "Maintenance mode: {{ maintenance_mode_result.stdout | default('skipped') }}"

    - name: "[PREP-3.3] Hentikan GitLab background jobs"
      shell: |
        gitlab-ctl stop sidekiq 2>&1 || true
        gitlab-ctl stop puma 2>&1 || true
        echo "Background jobs dihentikan"
      register: stop_jobs
      failed_when: false

    - name: "[PREP-3.4] Tunggu active connections selesai (30 detik)"
      pause:
        seconds: 30
        prompt: "Menunggu active connections selesai sebelum backup..."

    - name: "[PREP-3.5] Backup GitLab (tanpa registry/artifacts besar)"
      shell: |
        CRON=1 gitlab-backup create BACKUP=pre_patch_{{ ansible_date_time.date | replace('-','') }} \
          SKIP={{ gitlab_backup_skip }} 2>&1
      register: gitlab_backup_result
      async: "{{ gitlab_backup_timeout }}"
      poll: 30
      when: gitlab_backup_before_patch | bool
      failed_when:
        - gitlab_backup_result.rc is defined
        - gitlab_backup_result.rc != 0

    - name: "[PREP-3.6] Verifikasi backup berhasil"
      shell: |
        ls -lt {{ gitlab_backup_path }}/*.tar | head -1
      register: backup_file_check
      when: gitlab_backup_before_patch | bool
      failed_when: backup_file_check.rc != 0

    - name: "[PREP-3.7] Tampilkan file backup"
      debug:
        msg: "Backup selesai: {{ backup_file_check.stdout | default('N/A') }}"
      when: gitlab_backup_before_patch | bool

    - name: "[PREP-3.8] Catat versi saat ini untuk rollback"
      shell: dpkg -l {{ gitlab_package_name }} | grep "^ii" | awk '{print $3}'
      register: gitlab_version_before
      changed_when: false
      failed_when: false

    - name: "[PREP-3.9] Simpan versi sebelum patch"
      set_fact:
        gitlab_pre_patch_version: "{{ gitlab_version_before.stdout | trim }}"

    - name: "[PREP-3.10] Log versi pre-patch"
      debug:
        msg: "Versi sebelum patch: {{ gitlab_pre_patch_version }}"


- name: "PHASE 4 | GitLab Patch (Patch-Only / No Major Upgrade)"
  hosts: gitlab_servers
  gather_facts: false
  any_errors_fatal: false
  tags: [gitlab_patch, patch]
  tasks:

    - name: "[PATCH-4.1] Cek versi tersedia di repository"
      shell: |
        apt-cache madison {{ gitlab_package_name }} 2>/dev/null | head -10
      register: versions_available
      changed_when: false
      failed_when: false

    - name: "[PATCH-4.2] Tampilkan versi tersedia"
      debug:
        msg: "{{ versions_available.stdout_lines }}"

    - name: "[PATCH-4.3] Tentukan versi target"
      shell: |
        CURRENT="{{ gitlab_pre_patch_version }}"
        CURRENT_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
        CURRENT_MINOR=$(echo "$CURRENT" | cut -d. -f2)

        {% if gitlab_target_version != "" %}
        TARGET="{{ gitlab_target_version }}"
        TARGET_MAJOR=$(echo "$TARGET" | cut -d. -f1)
        TARGET_MINOR=$(echo "$TARGET" | cut -d. -f2)

        # Safety check: tidak boleh loncat major version
        if [ "$TARGET_MAJOR" != "$CURRENT_MAJOR" ]; then
          echo "ERROR: Major version jump tidak diizinkan ({{ gitlab_allow_major_upgrade }})"
          echo "Current: $CURRENT, Target: $TARGET"
          exit 1
        fi

        # Safety check: minor version jump max 1
        MINOR_DIFF=$((TARGET_MINOR - CURRENT_MINOR))
        if [ "$MINOR_DIFF" -gt "{{ gitlab_allowed_version_jump }}" ]; then
          echo "ERROR: Minor version jump $MINOR_DIFF melebihi batas {{ gitlab_allowed_version_jump }}"
          exit 1
        fi
        echo "TARGET_VERSION=$TARGET"
        {% else %}
        # Ambil latest patch dari major.minor yang sama
        LATEST=$(apt-cache madison {{ gitlab_package_name }} 2>/dev/null | \
          grep "^{{ gitlab_package_name }}" | \
          awk '{print $3}' | \
          grep "^${CURRENT_MAJOR}.${CURRENT_MINOR}." | \
          sort -V | tail -1)

        if [ -z "$LATEST" ]; then
          echo "NO_UPDATE: Tidak ada patch tersedia untuk ${CURRENT_MAJOR}.${CURRENT_MINOR}.x"
          exit 0
        fi

        if [ "$LATEST" = "$CURRENT" ]; then
          echo "ALREADY_LATEST: Versi $CURRENT sudah terbaru"
          exit 0
        fi

        echo "TARGET_VERSION=$LATEST"
        {% endif %}
      register: version_determination
      changed_when: false

    - name: "[PATCH-4.4] Parse target version"
      set_fact:
        gitlab_target_determined: >-
          {{ version_determination.stdout_lines | 
             select('match', '^TARGET_VERSION=') | 
             list | first | default('') | 
             regex_replace('^TARGET_VERSION=', '') | trim }}
        patch_skip: >-
          {{ version_determination.stdout is search('NO_UPDATE|ALREADY_LATEST') }}

    - name: "[PATCH-4.5] Tampilkan keputusan patching"
      debug:
        msg: >
          {% if patch_skip %}
          ✅ SKIP: {{ version_determination.stdout | trim }}
          {% else %}
          🔄 Akan upgrade dari {{ gitlab_pre_patch_version }} ke {{ gitlab_target_determined }}
          {% endif %}

    - name: "[PATCH-4.6] Stop GitLab services sebelum upgrade"
      shell: gitlab-ctl stop 2>&1
      register: stop_result
      when: not patch_skip
      failed_when: false

    - name: "[PATCH-4.7] Lakukan GitLab package upgrade"
      apt:
        name: >-
          {{ gitlab_package_name }}{% if gitlab_target_determined != '' %}={{ gitlab_target_determined }}{% endif %}
        state: present
        only_upgrade: true
        dpkg_options: "force-confdef,force-confold"
        update_cache: false
      register: gitlab_upgrade_result
      when:
        - not patch_skip
        - gitlab_target_determined != ''
      retries: "{{ apt_retries }}"
      delay: "{{ apt_retry_delay }}"
      until: gitlab_upgrade_result is succeeded

    - name: "[PATCH-4.8] Jalankan gitlab-ctl reconfigure"
      shell: |
        gitlab-ctl reconfigure 2>&1
      register: reconfigure_result
      async: 600
      poll: 15
      when: not patch_skip
      failed_when: reconfigure_result.rc != 0

    - name: "[PATCH-4.9] Jalankan database migrations"
      shell: |
        gitlab-rake db:migrate 2>&1
      register: db_migrate_result
      when: not patch_skip
      failed_when: db_migrate_result.rc != 0
      async: 300
      poll: 15

    - name: "[PATCH-4.10] Start GitLab services"
      shell: gitlab-ctl start 2>&1
      register: start_result
      when: not patch_skip
      failed_when: false

    - name: "[PATCH-4.11] Tampilkan hasil upgrade"
      debug:
        msg:
          - "Upgrade package: {{ 'SUCCESS' if gitlab_upgrade_result is succeeded else 'SKIPPED/FAILED' }}"
          - "Reconfigure: {{ 'SUCCESS' if reconfigure_result is succeeded else 'SKIPPED/FAILED' }}"
          - "DB Migrate: {{ 'SUCCESS' if db_migrate_result is succeeded else 'SKIPPED/FAILED' }}"
      when: not patch_skip


- name: "PHASE 5 | Post-Patch Verification & Rollback"
  hosts: gitlab_servers
  gather_facts: false
  any_errors_fatal: false
  tags: [verify, postpatch]
  tasks:

    - name: "[VERIFY-5.1] Tunggu GitLab startup (60 detik)"
      pause:
        seconds: 60
        prompt: "Menunggu GitLab services startup setelah patch..."

    - name: "[VERIFY-5.2] Cek status services GitLab"
      shell: gitlab-ctl status 2>&1
      register: gitlab_status_post
      changed_when: false
      failed_when: false

    - name: "[VERIFY-5.3] Health check - endpoint /-/health"
      uri:
        url: "{{ gitlab_healthcheck_url }}"
        method: GET
        status_code: [200]
        timeout: 30
        validate_certs: false
      register: health_check
      retries: "{{ gitlab_healthcheck_retries }}"
      delay: "{{ gitlab_healthcheck_delay }}"
      until: health_check.status == 200
      failed_when: false

    - name: "[VERIFY-5.4] Readiness check - endpoint /-/readiness"
      uri:
        url: "{{ gitlab_readiness_url }}"
        method: GET
        status_code: [200]
        timeout: 30
        validate_certs: false
      register: readiness_check
      retries: "{{ gitlab_healthcheck_retries }}"
      delay: "{{ gitlab_healthcheck_delay }}"
      until: readiness_check.status == 200
      failed_when: false

    - name: "[VERIFY-5.5] Verifikasi version setelah patch"
      shell: dpkg -l {{ gitlab_package_name }} | grep "^ii" | awk '{print $3}'
      register: gitlab_version_after
      changed_when: false
      failed_when: false

    - name: "[VERIFY-5.6] Evaluasi keberhasilan patch"
      set_fact:
        patch_successful: >-
          {{ (health_check.status | default(0) == 200) and
             (readiness_check.status | default(0) == 200) }}
        gitlab_post_patch_version: "{{ gitlab_version_after.stdout | trim }}"

    - name: "[VERIFY-5.7] Tampilkan hasil verifikasi"
      debug:
        msg:
          - "=== HASIL PATCHING GitLab ==="
          - "Versi sebelum : {{ gitlab_pre_patch_version | default('N/A') }}"
          - "Versi sesudah : {{ gitlab_post_patch_version }}"
          - "Health check  : {{ '✅ PASS' if health_check.status | default(0) == 200 else '❌ FAIL' }}"
          - "Readiness     : {{ '✅ PASS' if readiness_check.status | default(0) == 200 else '❌ FAIL' }}"
          - "Status        : {{ '✅ SUKSES' if patch_successful else '❌ GAGAL - Pertimbangkan rollback' }}"

    # --- ROLLBACK jika gagal ---
    - name: "[ROLLBACK-5.8] Rollback jika patch gagal"
      when:
        - not patch_successful
        - gitlab_rollback_on_failure | bool
        - gitlab_pre_patch_version is defined
        - gitlab_pre_patch_version != ''
      block:
        - name: "ROLLBACK | Stop GitLab"
          shell: gitlab-ctl stop 2>&1
          failed_when: false

        - name: "ROLLBACK | Downgrade ke versi sebelumnya"
          apt:
            name: "{{ gitlab_package_name }}={{ gitlab_pre_patch_version }}"
            state: present
            dpkg_options: "force-confdef,force-confold"
            allow_downgrade: true
          register: rollback_result
          failed_when: false

        - name: "ROLLBACK | Reconfigure setelah rollback"
          shell: gitlab-ctl reconfigure 2>&1
          failed_when: false

        - name: "ROLLBACK | Restore database dari backup"
          shell: |
            LATEST_BACKUP=$(ls -t {{ gitlab_backup_path }}/*.tar | head -1)
            if [ -n "$LATEST_BACKUP" ]; then
              BACKUP_ID=$(basename "$LATEST_BACKUP" | sed 's/_gitlab_backup.tar//')
              gitlab-backup restore BACKUP="$BACKUP_ID" force=yes 2>&1
            else
              echo "ERROR: Tidak ada backup ditemukan untuk rollback"
              exit 1
            fi
          register: restore_result
          failed_when: false
          async: 1800
          poll: 30

        - name: "ROLLBACK | Start GitLab setelah rollback"
          shell: gitlab-ctl start 2>&1
          failed_when: false

        - name: "ROLLBACK | Verifikasi health setelah rollback"
          uri:
            url: "{{ gitlab_healthcheck_url }}"
            status_code: [200]
            timeout: 30
            validate_certs: false
          register: rollback_health
          retries: 10
          delay: 15
          until: rollback_health.status == 200
          failed_when: false

        - name: "ROLLBACK | Status rollback"
          debug:
            msg: >
              ROLLBACK {{ '✅ BERHASIL' if rollback_health.status | default(0) == 200 else '❌ GAGAL - Intervensi manual diperlukan!' }}

    - name: "[VERIFY-5.9] Disable maintenance mode"
      shell: |
        gitlab-rails runner "
          Gitlab::CurrentSettings.update!(maintenance_mode: false)
        " 2>&1
      failed_when: false
      when: gitlab_maintenance_enabled | bool

    - name: "[VERIFY-5.10] Buat laporan akhir"
      copy:
        content: |
          ================================================
          LAPORAN PATCHING GITLAB - {{ ansible_date_time.iso8601 }}
          ================================================
          Host               : {{ inventory_hostname }}
          OS                 : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Versi Sebelum      : {{ gitlab_pre_patch_version | default('N/A') }}
          Versi Sesudah      : {{ gitlab_post_patch_version }}
          Health Check       : {{ 'PASS' if health_check.status | default(0) == 200 else 'FAIL' }}
          Readiness Check    : {{ 'PASS' if readiness_check.status | default(0) == 200 else 'FAIL' }}
          Status Keseluruhan : {{ 'SUKSES' if patch_successful else 'GAGAL' }}
          Rollback Dijalankan: {{ 'YA' if (not patch_successful and gitlab_rollback_on_failure) else 'TIDAK' }}
          ================================================
        dest: "/tmp/gitlab_patch_report_{{ inventory_hostname }}_{{ ansible_date_time.date }}.txt"
      delegate_to: localhost
      become: false
