---
- name: Monthly Linux Full Upgrade (dist-upgrade)
  hosts: linux_servers
  become: yes
  tasks:
    # --- PROSES UPGRADE ---
    - name: Debian/Ubuntu - Run dist-upgrade
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: RHEL/AlmaLinux - Run Full Upgrade
      ansible.builtin.dnf:
        name: '*'
        state: latest
        update_cache: yes
      when: ansible_os_family == "RedHat"

    # --- DETEKSI KEBUTUHAN REBOOT ---
    - name: Debian/Ubuntu - Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: debian_reboot
      when: ansible_os_family == "Debian"

    - name: RHEL/AlmaLinux - Check if reboot is required
      ansible.builtin.command: needs-restarting -r
      register: rhel_reboot
      failed_when: false
      changed_when: rhel_reboot.rc == 1
      when: ansible_os_family == "RedHat"

    # --- EKSEKUSI REBOOT ---
    - name: Reboot server if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible for monthly kernel/system updates"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: >
        (debian_reboot.stat.exists | default(false)) or
        (rhel_reboot.rc | default(0) == 1)
